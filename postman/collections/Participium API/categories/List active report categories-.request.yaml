$kind: http-request
name: List active report categories.
url: "{{baseUrl}}/categories"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Returns array of categories", () => {
          const body = pm.response.json();
          pm.expect(body).to.be.an("array").that.is.not.empty;
      });
      pm.test("Category has required fields", () => {
          const body = pm.response.json();
          const cat = body[0];
          pm.expect(cat).to.have.property("id");
          pm.expect(cat).to.have.property("name");
          pm.expect(cat).to.have.property("is_active");
          pm.expect(cat.is_active).to.be.true;
      });
    language: text/javascript
examples: ./.resources/List active report categories-.resources/examples
order: 1000
