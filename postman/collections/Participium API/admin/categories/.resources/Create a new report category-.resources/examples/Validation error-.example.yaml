$kind: http-example
name: Validation error.
request:
  url: "{{baseUrl}}/admin/categories"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "name": "string",
        "is_active": true
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "string"
      }
order: 2000
