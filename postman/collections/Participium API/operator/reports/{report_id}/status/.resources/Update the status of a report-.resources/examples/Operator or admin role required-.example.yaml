$kind: http-example
name: Operator or admin role required.
request:
  url: "{{baseUrl}}/operator/reports/:report_id/status"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    report_id: "6011"
  body:
    type: json
    content: |-
      {
        "status": "in_progress",
        "note": "string"
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "string"
      }
order: 4000
