$kind: http-request
name: List all categories, including inactive ones.
url: "{{baseUrl}}/admin/categories"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('response is an array', function () {
          pm.response.to.be.json;
          pm.expect(pm.response.json()).to.be.an('array');
      });

      pm.test('each category has id, name, is_active, created_at', function () {
          var json = pm.response.json();
          pm.expect(json.length).to.be.above(0);
          json.forEach(function (cat) {
              pm.expect(cat.id).to.be.a('number');
              pm.expect(cat.name).to.be.a('string');
              pm.expect(cat.is_active).to.be.a('boolean');
              pm.expect(cat.created_at).to.be.a('string');
          });
      });

      pm.test('admin list includes inactive categories', function () {
          pm.expect(pm.response.json().length).to.be.above(0);
      });
    language: text/javascript
examples: ./.resources/List all categories, including inactive ones-.resources/examples
order: 2000
