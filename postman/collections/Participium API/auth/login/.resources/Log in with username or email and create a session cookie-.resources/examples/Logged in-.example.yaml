$kind: http-example
name: Logged in.
request:
  url: "{{baseUrl}}/auth/login"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "identifier": "citizen@example.com",
        "password": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "string",
        "user": {
          "id": 1,
          "username": "citizen",
          "first_name": "Marco",
          "last_name": "Citizen",
          "email": "citizen@example.com",
          "role": "operator",
          "is_active": true,
          "is_email_verified": false,
          "email_notifications_enabled": true,
          "category": {
            "id": 1,
            "name": "Roads and Urban Furniture",
            "is_active": false,
            "created_at": "1947-02-02T08:31:25.010Z"
          },
          "category_id": 6951,
          "created_at": "2014-03-20T09:15:42.152Z",
          "profile_picture_path": "string",
          "profile_picture_url": "string"
        }
      }
order: 1000
