
x-db-credentials: &db-credentials
  MYSQL_DATABASE: participium
  MYSQL_USER: participium
  MYSQL_PASSWORD: participium_password

services:
  database:
    image: mysql:8
    container_name: participium-database        # richiesto dal docker exec di verifica
    environment:
      <<: *db-credentials
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql               
    healthcheck:
      # check applicativo: l'utente partecipium si autentica E usa il suo db
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -uparticipium -pparticipium_password participium -e 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s                          # margine al primo avvio su volume pulito


  #  BACKEND — SOLO environment + depends_on

  backend:
    build:
      context: ..                                # cartella che Docker "vede": la radice del progetto
      dockerfile: docker/backend.Dockerfile      # la ricetta scritta dal compagno (parte 1)
    container_name: participium-backend
    ports:
      - "5050:5050"                              # ESTERNO:INTERNO — apre la 5050 verso il browser
    environment:
      DATABASE_URL: "mysql+pymysql://participium:participium_password@database:3306/participium?autocommit=true"
      SECRET_KEY: dev-secret-change-me
      FRONTEND_ORIGIN: http://localhost:5173
      HOST: 0.0.0.0
      PORT: 5050
      AUTO_INIT_DB: "true"
      BOOTSTRAP_REFERENCE_DATA: "true"
      BOOTSTRAP_DEMO_DATA: "true"
    volumes:
      - ../src/backend:/usr/src/app                                 # codice vivo: modifiche dal PC = subito nel container
      - backend-instance:/usr/src/app/instance                     # file interni del backend, da conservare
      - backend-media:/usr/src/app/participium/static/uploads      # foto caricate, da conservare
    depends_on:
      database:
        condition: service_healthy               # aspetta il DB *pronto*, non solo *avviato*


  #  FRONTEND

  frontend:
    build:
      context: ..                                # stessa radice del progetto
      dockerfile: docker/frontend.Dockerfile     # ricetta del frontend (parte 2)
    container_name: participium-frontend
    ports:
      - "5173:5173"                              # apre la 5173 verso il browser
    environment:
      VITE_API_BASE_URL: http://localhost:5050/api/v1   # dove il frontend trova le API del backend
      VITE_BACKEND_BASE_URL: http://localhost:5050      # indirizzo base del backend
    volumes:
      - ../src/frontend:/usr/src/app                    # codice vivo dal PC
      - frontend-node-modules:/usr/src/app/node_modules # pacchetti npm, gestiti dentro il container
    depends_on:
      - backend                                  # parte dopo il backend

volumes:
  mysql-data:
  backend-instance:
  backend-media:
  frontend-node-modules: