$kind: http-example
name: Invalid credentials.
request:
  url: "{{baseUrl}}/auth/login"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "identifier": "citizen@example.com",
        "password": "string"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "string"
      }
order: 2000
