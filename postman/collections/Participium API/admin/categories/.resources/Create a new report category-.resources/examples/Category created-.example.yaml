$kind: http-example
name: Category created.
request:
  url: "{{baseUrl}}/admin/categories"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "name": "string",
        "is_active": true
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": 1,
        "name": "Roads and Urban Furniture",
        "is_active": true,
        "created_at": "2000-07-05T20:52:15.130Z"
      }
order: 1000
