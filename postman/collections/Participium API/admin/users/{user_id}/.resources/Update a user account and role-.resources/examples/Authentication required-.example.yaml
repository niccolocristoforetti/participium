$kind: http-example
name: Authentication required.
request:
  url: "{{baseUrl}}/admin/users/:user_id"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    user_id: "6011"
  body:
    type: json
    content: |-
      {
        "category_id": 7367,
        "email": "gbPkZiXtxZ@eIcNjyLNGWIqUIu.gw",
        "email_notifications_enabled": true,
        "first_name": "string",
        "is_active": false,
        "last_name": "string",
        "password": "string",
        "role": "admin",
        "username": "string"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
