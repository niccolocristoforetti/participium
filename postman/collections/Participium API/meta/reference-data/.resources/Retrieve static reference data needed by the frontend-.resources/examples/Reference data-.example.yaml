$kind: http-example
name: Reference data.
request:
  url: "{{baseUrl}}/meta/reference-data"
  method: GET
  headers:
    Accept: application/json
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "roles": [
          "admin",
          "citizen"
        ],
        "report_statuses": [
          "rejected",
          "in_progress"
        ],
        "public_report_statuses": [
          "resolved",
          "pending_approval"
        ]
      }
order: 1000
