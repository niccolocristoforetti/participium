$kind: http-request
url: "{{baseUrl}}/auth/verify/{{verify_token}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Email verified", () => { pm.expect(pm.response.json().message).to.eql("Email verified."); });
    language: text/javascript
examples: ./.resources/Verify a citizen email address.resources/examples
order: 1000
