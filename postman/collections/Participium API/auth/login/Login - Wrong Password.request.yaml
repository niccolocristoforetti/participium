$kind: http-request
url: "{{baseUrl}}/auth/login"
method: POST
body:
  type: json
  content: |
    {
      "identifier": "{{citizen_email}}",
      "password": "WrongPassword!"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 401", () => pm.response.to.have.status(401));
      pm.test("Has error", () => { pm.expect(pm.response.json()).to.have.property("error"); });
    language: text/javascript
order: 2000
